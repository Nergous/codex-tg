name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Validate tag and changelog
        shell: bash
        env:
          RELEASE_NOTES: ${{ runner.temp }}/release-notes.md
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"

          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]([[:space:]]|$)" {
              found = 1
              next
            }

            found && /^## \[/ {
              exit
            }

            found {
              print
            }

            END {
              if (!found) {
                exit 2
              }
            }
          ' CHANGELOG.md > "${RELEASE_NOTES}"

          if ! grep -q '[^[:space:]]' "${RELEASE_NOTES}"; then
            echo "CHANGELOG.md has no notes for ${version}"
            exit 1
          fi

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Run govulncheck
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          repo-checkout: false
          go-version-file: go.mod
          cache-dependency-path: go.sum
          go-package: ./...
          output-format: text

  publish:
    name: Publish release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Extract release notes
        shell: bash
        env:
          RELEASE_NOTES: ${{ runner.temp }}/release-notes.md
        run: |
          version="${GITHUB_REF_NAME#v}"

          awk -v version="${version}" '
            $0 ~ "^## \\[" version "\\]([[:space:]]|$)" {
              found = 1
              next
            }

            found && /^## \[/ {
              exit
            }

            found {
              print
            }

            END {
              if (!found) {
                exit 2
              }
            }
          ' CHANGELOG.md > "${RELEASE_NOTES}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: >-
            release
            --clean
            --release-notes=${{ runner.temp }}/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
