name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            printf 'Unformatted Go files:\n%s\n' "${unformatted}"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test with race detector and coverage
        run: |
          mkdir -p .artifacts/coverage
          go test \
            -race \
            -count=1 \
            -covermode=atomic \
            -coverprofile=.artifacts/coverage/coverage.out \
            ./...
          go tool cover \
            -func=.artifacts/coverage/coverage.out
          go tool cover \
            -html=.artifacts/coverage/coverage.out \
            -o .artifacts/coverage/coverage.html

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            .artifacts/coverage/coverage.out
            .artifacts/coverage/coverage.html
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows build
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Verify dependencies
        run: |
          go mod download
          go mod verify

      - name: Test
        run: go test -count=1 ./...

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .artifacts/bin | Out-Null
          go build `
            -trimpath `
            -o .artifacts/bin/codex-tg.exe `
            ./cmd/codex-tg

      - name: Upload Windows binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: codex-tg-windows-amd64
          path: .artifacts/bin/codex-tg.exe
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  vulnerability:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Run govulncheck
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          go-package: ./...
          output-format: text
